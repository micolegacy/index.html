
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storyboard Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
    --accent: #7c5cfc; --accent2: #fc5c7c; --text: #e8e8f0; --muted: #6b6b80;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
  header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); background: rgba(124,92,252,0.12); padding: 4px 10px; border-radius: 4px; }
  header h1 { font-size: 18px; font-weight: 600; }
  .container { padding: 20px; max-width: 700px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input[type="text"], textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 14px; padding: 12px 14px; outline: none; transition: border-color 0.2s; resize: vertical; }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
  input[type="text"] { font-family: 'Space Mono', monospace; font-size: 13px; }
  textarea { min-height: 180px; line-height: 1.6; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .hint code { font-family: 'Space Mono', monospace; background: var(--border); padding: 1px 5px; border-radius: 3px; font-size: 11px; color: var(--accent); }
  .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; margin-bottom: 12px; transition: transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: linear-gradient(135deg, #7c5cfc, #fc5c7c); }
  .btn-download { background: linear-gradient(135deg, #1a8a5a, #5cfca0); color: #0a0a0f; display: none; }
  .btn-download.show { display: block; }
  #status { display: none; font-size: 13px; color: var(--muted); text-align: center; padding: 10px 0; font-family: 'Space Mono', monospace; }
  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; margin: 8px 0 16px; overflow: hidden; display: none; }
  .progress-bar.show { display: block; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7c5cfc, #fc5c7c); width: 0%; transition: width 0.4s ease; }
  #error { background: rgba(252,92,124,0.1); border: 1px solid rgba(252,92,124,0.3); border-radius: 10px; padding: 14px 16px; font-size: 13px; color: #fc5c7c; display: none; margin-bottom: 16px; }
  #error.show { display: block; }
  #board { display: grid; gap: 20px; }
  .scene { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .scene-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .timestamp { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(124,92,252,0.12); padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
  .scene-title { font-size: 14px; font-weight: 600; flex: 1; }
  .scene-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .scene-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--bg); display: flex; align-items: center; justify-content: center; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .scene-caption { padding: 12px 16px; font-size: 12px; color: var(--muted); line-height: 1.5; font-style: italic; }
  .saved-badge { display: none; color: #5cfca0; font-size: 10px; letter-spacing: 0.1em; margin-left: 6px; }
</style>
</head>
<body>

<header>
  <span class="logo">SB</span>
  <h1>Storyboard Generator</h1>
</header>

<div class="container">

  <div class="card">
    <label>OpenRouter API Key <span class="saved-badge" id="savedBadge">✓ SAVED</span></label>
    <input type="text" id="apiKey" placeholder="sk-or-..." autocomplete="off" oninput="saveKey()" />
    <p class="hint">Free at <strong>openrouter.ai</strong> — Sign up free → Keys → Create Key. Saved automatically in your browser.</p>
  </div>

  <div class="card">
    <label>Timestamped Script</label>
    <textarea id="script" placeholder="0:00 - Dark city skyline at night&#10;0:15 - A lone figure under a flickering streetlight&#10;0:30 - Close-up of hands holding a photograph&#10;1:00 - The figure looks up, city lights in their eyes"></textarea>
    <p class="hint">Format: <code>0:00 - Your scene description</code> — one line per scene.</p>
  </div>

  <div id="error"></div>

  <button class="btn btn-primary" id="generateBtn" onclick="generate()">Generate Storyboard</button>
  <button class="btn btn-download" id="downloadBtn" onclick="downloadAll()">Download All as ZIP</button>

  <div id="status"></div>
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="board"></div>

</div>

<script>
const imgs = [];

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (k) { localStorage.setItem('or_key', k); document.getElementById('savedBadge').style.display = 'inline'; }
}

window.onload = function() {
  const k = localStorage.getItem('or_key');
  if (k) { document.getElementById('apiKey').value = k; document.getElementById('savedBadge').style.display = 'inline'; }
};

function parseScript(txt) {
  return txt.trim().split('\n').filter(l => l.trim()).map(l => {
    const m = l.match(/^(\d+:\d+(?::\d+)?)\s*[-\u2013\u2014]\s*(.+)$/);
    return m ? { ts: m[1], desc: m[2].trim() } : null;
  }).filter(Boolean);
}

function tsToFile(ts) { return ts.replace(/:/g, '_') + '.jpg'; }

async function getPrompt(key, desc) {
  const r = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key,
      'HTTP-Referer': 'https://micolegacy.github.io',
      'X-Title': 'Storyboard Generator'
    },
    body: JSON.stringify({
      model: 'mistralai/mistral-7b-instruct:free',
      max_tokens: 150,
      messages: [{ role: 'user', content: 'Write a short cinematic image generation prompt (max 50 words) for this scene. Only output the prompt, nothing else.\n\nScene: ' + desc }]
    })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || 'API error'); }
  const d = await r.json();
  return d.choices[0].message.content.trim();
}

function imgUrl(prompt) {
  return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt + ', cinematic, 4k, dramatic lighting') + '?width=800&height=450&nologo=true&seed=' + Math.floor(Math.random()*99999);
}

function showErr(msg) { const e = document.getElementById('error'); e.textContent = msg; e.classList.add('show'); }
function hideErr() { document.getElementById('error').classList.remove('show'); }
function setProgress(d, t) { document.getElementById('progressFill').style.width = (t ? Math.round(d/t*100) : 0) + '%'; }

async function generate() {
  hideErr();
  imgs.length = 0;
  document.getElementById('downloadBtn').classList.remove('show');

  const key = document.getElementById('apiKey').value.trim();
  const txt = document.getElementById('script').value.trim();

  if (!key) { showErr('Please enter your OpenRouter API key.'); return; }
  if (!txt) { showErr('Please enter your script.'); return; }

  const scenes = parseScript(txt);
  if (!scenes.length) { showErr('No valid lines found. Format: 0:00 - Your scene description'); return; }

  const btn = document.getElementById('generateBtn');
  const status = document.getElementById('status');
  const bar = document.getElementById('progressBar');
  const board = document.getElementById('board');

  btn.disabled = true;
  status.style.display = 'block';
  status.textContent = 'Starting...';
  bar.classList.add('show');
  board.innerHTML = '';
  setProgress(0, scenes.length);

  scenes.forEach((s, i) => {
    board.innerHTML += `
      <div class="scene" id="scene-${i}">
        <div class="scene-header">
          <span class="timestamp">${s.ts}</span>
          <span class="scene-title">${s.desc}</span>
        </div>
        <div class="scene-placeholder" id="ph-${i}"><div class="spinner"></div></div>
        <div class="scene-caption" id="cap-${i}">Generating...</div>
      </div>`;
  });

  for (let i = 0; i < scenes.length; i++) {
    const s = scenes[i];
    status.textContent = 'Scene ' + (i+1) + ' of ' + scenes.length + ' — ' + s.ts;
    try {
      const prompt = await getPrompt(key, s.desc);
      const url = imgUrl(prompt);
      document.getElementById('cap-' + i).textContent = prompt;
      const img = document.createElement('img');
      img.className = 'scene-img';
      img.src = url;
      img.alt = s.desc;
      img.loading = 'lazy';
      document.getElementById('ph-' + i).replaceWith(img);
      imgs.push({ url, ts: s.ts });
    } catch(err) {
      document.getElementById('ph-' + i).innerHTML = '<span style="color:#fc5c7c;font-size:12px;padding:20px;display:block;text-align:center">Failed: ' + err.message + '</span>';
      document.getElementById('cap-' + i).textContent = 'Could not generate this scene.';
    }
    setProgress(i+1, scenes.length);
  }

  status.textContent = 'Done — ' + scenes.length + ' scenes generated';
  btn.disabled = false;
  bar.classList.remove('show');
  if (imgs.length) document.getElementById('downloadBtn').classList.add('show');
}

async function downloadAll() {
  const btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  btn.textContent = 'Preparing ZIP...';
  const zip = new JSZip();
  const folder = zip.folder('storyboard');
  for (const item of imgs) {
    try {
      const blob = await fetch(item.url).then(r => r.blob());
      folder.file(tsToFile(item.ts), blob);
    } catch(e) {}
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'storyboard.zip';
  a.click();
  btn.disabled = false;
  btn.textContent = 'Download All as ZIP';
}
</script>
</body>
</html>
