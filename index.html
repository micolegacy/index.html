<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Storyboard Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root { --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e; --accent: #7c5cfc; --text: #e8e8f0; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 15px; }
  select, input, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: white; margin-top: 5px; border-radius: 6px; }
  .btn { padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; background: var(--accent); color: white; margin-top: 10px; }
  .key-container { display: flex; gap: 5px; align-items: center; }
</style>
</head>
<body>

<div class="container" style="max-width: 700px; margin: 0 auto;">
  <h2>Storyboard Generator</h2>
  
  <div class="card">
    <label>OpenRouter API Key</label>
    <div class="key-container">
      <input type="password" id="apiKey" placeholder="sk-or-..." />
      <button class="btn" onclick="toggleVisibility()" style="background:#333; padding: 12px 15px;">👁</button>
    </div>
    <button class="btn" onclick="clearKey()" style="background:#444">Clear Key</button>
    <div id="valStatus" style="margin-top: 10px; font-size: 14px;"></div>
  </div>

  <div class="card">
    <label>Aspect Ratio</label>
    <select id="aspectRatio">
      <option value="1280x720">16:9 (Cinematic)</option>
      <option value="720x1280">9:16 (Portrait)</option>
      <option value="1024x1024">1:1 (Square)</option>
    </select>
  </div>

  <div class="card">
    <label>Timestamped Script</label>
    <textarea id="script" placeholder="0:00 - Scene description"></textarea>
    <button class="btn" id="generateBtn" onclick="startGeneration()">Generate Sequence</button>
  </div>

  <div id="status"></div>
  <div id="board"></div>
</div>

<script>
function toggleVisibility() {
  const x = document.getElementById("apiKey");
  x.type = (x.type === "password") ? "text" : "password";
}

function clearKey() { 
  localStorage.removeItem('or_key'); 
  document.getElementById('apiKey').value = ''; 
  document.getElementById('valStatus').textContent = '';
}

async function validateKey(key) {
  const status = document.getElementById('valStatus');
  status.textContent = 'Validating...';
  try {
    const res = await fetch('https://openrouter.ai/api/v1/key', {
      headers: { 'Authorization': 'Bearer ' + key }
    });
    if (res.status === 200) {
      status.style.color = '#5cfca0';
      status.textContent = 'Correct';
      return true;
    }
    throw new Error();
  } catch(e) {
    status.style.color = '#fc5c7c';
    status.textContent = 'Error: Invalid Key';
    return false;
  }
}

async function startGeneration() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) return alert('Enter API Key');
  
  if (!(await validateKey(key))) return;

  const scriptLines = document.getElementById('script').value.trim().split('\n');
  const [w, h] = document.getElementById('aspectRatio').value.split('x');
  const board = document.getElementById('board');
  board.innerHTML = '';
  
  for (const line of scriptLines) {
    if(!line.trim()) continue;
    const [ts, ...descParts] = line.split('-');
    const desc = descParts.join('-');
    const el = document.createElement('div');
    el.innerHTML = `<h3>${ts}</h3><p>Generating...</p>`;
    board.appendChild(el);
    
    try {
      const promptRes = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: { 
            'Authorization': 'Bearer ' + key, 
            'Content-Type': 'application/json',
            'X-Title': 'Storyboard Generator'
        },
        body: JSON.stringify({ 
            // Fallback list: tries primary first, then falls back automatically
            models: [
                'anthropic/claude-3.5-sonnet',
                'openai/gpt-4o',
                'google/gemini-flash-1.5'
            ],
            messages: [{ role: 'user', content: 'Describe this for image generation: ' + desc }] 
        })
      });
      const data = await promptRes.json();
      const prompt = data.choices[0].message.content;
      const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${w}&height=${h}&seed=${Math.random()}`;
      el.innerHTML = `<h3>${ts}</h3><img src="${imgUrl}" width="100%">`;
    } catch(e) {
      el.innerHTML = `<h3>${ts}</h3><p style="color:red">Generation Failed</p>`;
    }
  }
}
</script>
</body>
</html>
