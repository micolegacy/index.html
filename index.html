<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storyboard Generator Debug</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e; --accent: #7c5cfc; --text: #e8e8f0; --muted: #6b6b80; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
  header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); background: rgba(124,92,252,0.12); padding: 4px 10px; border-radius: 4px; }
  header h1 { font-size: 18px; font-weight: 600; }
  .container { padding: 20px; max-width: 700px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input[type="text"], textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 14px; padding: 12px 14px; outline: none; resize: vertical; }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
  input[type="text"] { font-family: 'Space Mono', monospace; font-size: 13px; }
  textarea { min-height: 160px; line-height: 1.6; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; margin-bottom: 12px; }
  .btn-primary { background: linear-gradient(135deg, #7c5cfc, #fc5c7c); color: #fff; }
  .btn-download { background: linear-gradient(135deg, #1a8a5a, #5cfca0); color: #0a0a0f; display: none; }
  .btn-download.show { display: block; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #error, #debug { border-radius: 10px; padding: 14px 16px; font-size: 13px; white-space: pre-wrap; display: none; margin-bottom: 16px; }
  #error { background: rgba(252,92,124,0.1); border: 1px solid rgba(252,92,124,0.3); color: #fc5c7c; }
  #debug { background: rgba(124,92,252,0.08); border: 1px solid rgba(124,92,252,0.25); color: #d7d2ff; max-height: 240px; overflow: auto; font-family: 'Space Mono', monospace; font-size: 12px; }
  #board { display: grid; gap: 20px; }
  .scene { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .scene-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .timestamp { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(124,92,252,0.12); padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
  .scene-title { font-size: 14px; font-weight: 600; flex: 1; }
  .scene-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .scene-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ph-status { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; white-space: pre-wrap; text-align: center; max-width: 90%; }
  .scene-caption { padding: 12px 16px; font-size: 12px; color: var(--muted); line-height: 1.5; font-style: italic; white-space: pre-wrap; }
</style>
</head>
<body>
<header>
  <span class="logo">SB</span>
  <h1>Storyboard Generator</h1>
</header>

<div class="container">
  <div class="card">
    <label>OpenRouter API Key</label>
    <input type="text" id="apiKey" placeholder="sk-or-..." autocomplete="off" oninput="saveKey()" />
    <p class="hint">Enter your OpenRouter key here.</p>
  </div>

  <div class="card">
    <label>Visual Style</label>
    <input type="text" id="style" value="cinematic, photorealistic, dramatic lighting, film grain" />
  </div>

  <div class="card">
    <label>Timestamped Script</label>
    <textarea id="script" placeholder="0:00 - Dark city skyline at night
0:15 - A lone figure under a streetlight"></textarea>
  </div>

  <div id="error"></div>
  <div id="debug"></div>
  <button class="btn btn-primary" id="generateBtn" onclick="generate()">Generate Storyboard</button>
  <button class="btn btn-download" id="downloadBtn" onclick="downloadAll()">Download All as ZIP</button>
  <div id="board"></div>
</div>

<script>
const imgs = [];

function log(msg) {
  const d = document.getElementById('debug');
  d.style.display = 'block';
  d.textContent += (d.textContent ? '
' : '') + msg;
  d.scrollTop = d.scrollHeight;
}

function showErr(msg) {
  const e = document.getElementById('error');
  e.textContent = msg;
  e.style.display = 'block';
}

function hideErr() {
  document.getElementById('error').style.display = 'none';
  document.getElementById('error').textContent = '';
}

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (k) localStorage.setItem('or_key', k);
}

window.onload = function() {
  const k = localStorage.getItem('or_key');
  if (k) document.getElementById('apiKey').value = k;
};

function parseScript(txt) {
  return txt.trim().split('
').filter(Boolean).map(l => {
    const m = l.match(/^(d+:d+(?::d+)?)s*[-–—]s*(.+)$/);
    return m ? { ts: m[1], desc: m[2].trim() } : null;
  }).filter(Boolean);
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function fetchJsonWithDebug(url, options, label) {
  log(label + ' -> request started');
  let r;
  try {
    r = await fetch(url, options);
  } catch (e) {
    throw new Error(label + ' network error:
' + e.message);
  }
  const raw = await r.text();
  log(label + ' -> HTTP ' + r.status + ' ' + r.statusText);
  log(label + ' -> response:
' + raw.slice(0, 1000));
  let data = null;
  try { data = raw ? JSON.parse(raw) : null; } catch (e) {}
  if (!r.ok) {
    const msg = data?.error?.message || data?.message || raw || 'Unknown error';
    throw new Error(label + ' HTTP ' + r.status + ':
' + msg);
  }
  if (!data) throw new Error(label + ' returned non-JSON response');
  return data;
}

async function getCinematicPrompt(key, desc, style) {
  return fetchJsonWithDebug(
    'https://openrouter.ai/api/v1/chat/completions',
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key,
        'HTTP-Referer': location.origin,
        'X-Title': 'Storyboard Generator'
      },
      body: JSON.stringify({
        model: 'openrouter/auto',
        messages: [{
          role: 'user',
          content: 'Write a concise image generation prompt (max 40 words) for this scene. Style: ' + style + '. Output only the prompt text.

Scene: ' + desc
        }]
      })
    },
    'OpenRouter prompt'
  ).then(d => {
    const text = d.choices?.[0]?.message?.content;
    if (!text) throw new Error('OpenRouter prompt response had no text');
    return text.trim();
  });
}

function buildImgUrl(prompt, seed) {
  return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) +
    '?model=flux&width=1280&height=720&nologo=true&seed=' + seed;
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed'));
    img.src = url;
  });
}

async function processScene(key, scene, i, style) {
  const phStatus = document.getElementById('ph-status-' + i);
  const cap = document.getElementById('cap-' + i);
  try {
    phStatus.textContent = 'Writing prompt...';
    const prompt = await getCinematicPrompt(key, scene.desc, style);
    cap.textContent = prompt;
    phStatus.textContent = 'Generating image...';
    const url = buildImgUrl(prompt, Math.floor(Math.random() * 999999));
    log('Pollinations -> ' + url);
    const img = await loadImage(url);
    img.className = 'scene-img';
    const ph = document.getElementById('ph-' + i);
    ph.replaceWith(img);
    imgs[i] = { url, ts: scene.ts };
  } catch (err) {
    phStatus.textContent = 'FAILED
' + err.message;
    cap.textContent = 'Could not generate.';
    throw err;
  }
}

async function generate() {
  hideErr();
  document.getElementById('debug').textContent = '';
  const key = document.getElementById('apiKey').value.trim();
  const txt = document.getElementById('script').value.trim();
  const style = document.getElementById('style').value.trim() || 'cinematic, photorealistic';
  if (!key) return showErr('Please enter your OpenRouter API key.');
  if (!txt) return showErr('Please enter your script.');

  const scenes = parseScript(txt);
  if (!scenes.length) return showErr('No valid lines found. Use: 0:00 - Scene description');

  const btn = document.getElementById('generateBtn');
  const board = document.getElementById('board');
  const downloadBtn = document.getElementById('downloadBtn');
  btn.disabled = true;
  downloadBtn.classList.remove('show');
  board.innerHTML = '';
  imgs.length = 0;

  scenes.forEach((s, i) => {
    board.innerHTML += `
      <div class="scene" id="scene-${i}">
        <div class="scene-header">
          <span class="timestamp">${escapeHtml(s.ts)}</span>
          <span class="scene-title">${escapeHtml(s.desc)}</span>
        </div>
        <div class="scene-placeholder" id="ph-${i}">
          <div class="spinner"></div>
          <span class="ph-status" id="ph-status-${i}">Waiting...</span>
        </div>
        <div class="scene-caption" id="cap-${i}">Generating prompt...</div>
      </div>`;
  });

  const results = await Promise.allSettled(scenes.map((s, i) => processScene(key, s, i, style)));
  const failed = results.filter(r => r.status === 'rejected').length;
  const ok = results.length - failed;

  if (ok > 0) downloadBtn.classList.add('show');
  if (failed > 0) showErr(failed + ' scene(s) failed. Read the debug box above for the exact reason.');
  if (ok === 0) showErr('Nothing generated. See debug box above.');

  btn.disabled = false;
}

async function downloadAll() {
  const zip = new JSZip();
  const folder = zip.folder('storyboard');
  for (let i = 0; i < imgs.length; i++) {
    if (!imgs[i]?.url) continue;
    const blob = await fetch(imgs[i].url).then(r => r.blob());
    folder.file(imgs[i].ts.replace(/:/g, '_') + '.jpg', blob);
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'storyboard.zip';
  a.click();
}
</script>
</body>
</html>
